<style>
  :root{ --ink:#0f172a; --paper:#f6f8f7; }
  *{ -webkit-tap-highlight-color: transparent; }
  body{ font-family:'Pretendard',sans-serif; background:var(--paper); color:var(--ink); overscroll-behavior-y:none; }
  .tnum{ font-feature-settings:"tnum"; font-variant-numeric: tabular-nums; }
  .no-scrollbar::-webkit-scrollbar{ display:none; }
  .no-scrollbar{ -ms-overflow-style:none; scrollbar-thickness:none; scrollbar-width:none; }
  .card{ background:#fff; border:1px solid #e7ece9; border-radius:18px; box-shadow:0 1px 2px rgba(16,40,30,.04),0 8px 24px -16px rgba(16,40,30,.18); }
  .soft{ background:#fff; border:1px solid #eef2f0; border-radius:14px; }
  .tab-btn{ transition:all .18s ease; }
  .tab-btn.active{ background:#0f7c46; color:#fff; box-shadow:0 6px 16px -8px rgba(15,124,70,.7); }
  .pill{ border-radius:999px; }
  .grade-A{ background:#0f7c46;color:#fff } .grade-B{ background:#1fbf6a;color:#062b1a } .grade-C{ background:#fcd34d;color:#5b4708 } .grade-D{ background:#fb923c;color:#3d1e05 } .grade-E{ background:#f87171;color:#3d0808 } .grade-none{ background:#e2e8f0;color:#475569 }
  input,select,textarea{ outline:none; }
  .fld{ width:100%; border:1px solid #d8e0db; border-radius:11px; padding:10px 12px; font-size:14px; background:#ffff; }
  .fld:focus{ border-color:#1fbf6a; box-shadow:0 0 0 3px rgba(31,191,106,.15); }
  .btn{ border-radius:12px; font-weight:600; transition:.15s; display:inline-flex; align-items:center; justify-content:center; gap:6px; }
  .btn-primary{ background:#0f7c46; color:#fff; } .btn-primary:active{ background:#0f5031 }
  .btn-ghost{ background:#eef4f0; color:#0f7c46; } .btn-ghost:active{ background:#dce8e1 }
  .btn-danger{ background:#fee2e2; color:#b91c1c; }
  .slot{ transition:background .12s, box-shadow .12s; }
  .slot.dragover{ background:#dbfce8; box-shadow: inset 0 0 0 2px #1fbf6a; }
  .chip-drag{ touch-action:none; cursor:grab; user-select:none; -webkit-user-select:none; }
  body.dragging{ overflow:hidden; touch-action:none; }
  body.dragging .scroll-x, body.dragging #palette{ touch-action:none; }
  .ghost{ position:fixed; z-index:9999; pointer-events:none; opacity:.95; transform:translate(-50%,-50%) scale(1.03); box-shadow:0 12px 30px -8px rgba(0,0,0,.4); }
  .fade-in{ animation:fi .35s ease both; } @keyframes fi{ from{opacity:0; transform:translateY(6px)} to{opacity:1;transform:none} }
  .ai-card{ border-left:4px solid; }
  .skel{ background:linear-gradient(90deg,#eef2f0 25%,#e2e8e4 37%,#eef2f0 63%); background-size:400% 100%; animation:sk 1.2s ease infinite; } @keyframes sk{ 0%{background-position:100% 0} 100%{background-position:-100% 0} }
  .scroll-x{ overflow-x:auto; } .scroll-x::-webkit-scrollbar{height:6px} .scroll-x::-webkit-scrollbar-thumb{background:#cbd5d0;border-radius:3px}
  table.grid th, table.grid td{ white-space:nowrap; }
  .badge{ font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; }
  /* 방문계획 고정(sticky) */
  .sched-top{ position:sticky; top:0; z-index:30; }
  .sched-dayhead{ position:sticky; top:0; z-index:15; background:#fff; }
  .sched-timecol{ position:sticky; left:0; z-index:14; background:#fff; }
  .sched-corner{ position:sticky; left:0; top:0; z-index:16; background:#fff; }
</style>

<script>
/* =========================================================================
   MR 영업 전략 비서  —  단일 파일 SPA
   저장: window.storage (아티팩트 영구 저장) + 인메모리 폴백
   ========================================================================= */
"use strict";

/* ---------- 전역 오류 표시 (불투명한 'Script error' 방지) ---------- */
function showErrBanner(msg){
  try{
    let b=document.getElementById('errBanner');
    if(!b){ b=document.createElement('div'); b.id='errBanner';
      b.style.cssText='position:fixed;left:8px;right:8px;bottom:8px;z-index:9999;background:#7f1d1d;color:#fff;font-size:12px;line-height:1.4;padding:10px 12px;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.25);white-space:pre-wrap;word-break:break-all';
      b.onclick=()=>b.remove(); document.body.appendChild(b); }
    b.textContent='⚠ 오류: '+msg+'\n(탭하여 닫기)';
  }catch(_){}
}
window.addEventListener('error', ev=>{ const m=(ev.error&&ev.error.message)||ev.message||'알 수 없는 오류'; showErrBanner(m+(ev.lineno?(' @'+ev.lineno+':'+ev.colno):'')); });
window.addEventListener('unhandledrejection', ev=>{ const r=ev.reason; showErrBanner('Promise '+((r&&r.message)||r||'')); });

/* ---------- 0. 저장소 추상화 (영구 저장) ---------- */
const Store = (() => {
  const mem = {};
  const hasWS = (typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function');
  let hasLS = false;
  try { const t='__mr_probe'; window.localStorage.setItem(t,'1'); window.localStorage.removeItem(t); hasLS = true; } catch(e){ hasLS = false; }
  async function get(k){
    // 동기·신뢰성 높은 localStorage 우선, 없으면 window.storage, 그래도 없으면 메모리
    if(hasLS){ try{ const v=window.localStorage.getItem(k); if(v!=null) return v; }catch(e){} }
    if(hasWS){ try{ const r=await window.storage.get(k); if(r && r.value!=null) return r.value; }catch(e){} }
    return mem[k] ?? null;
  }
  async function set(k,v){
    mem[k]=v;
    if(hasLS){ try{ window.localStorage.setItem(k,v); }catch(e){} }
    if(hasWS){ try{ await window.storage.set(k,v); }catch(e){} }
  }
  return { get, set, hasWS, hasLS, persistent: hasWS||hasLS };
})();

};
const KEYS = ['clients','perf','targets','visits','devs','schedule','waitlist','check','collection','meta'];
let saveTimer=null;
function persist(keys){
  const ks = keys||KEYS;
  (ks).forEach(k=> Store.set('mr_'+k, JSON.stringify(state[k])) );
  // 백업 알림용: 실데이터 변경 시 변경시각 기록 (meta만 저장하는 경우는 제외해 무한루프 방지)
  const dataChanged = ks.some(k=>k!=='meta');
  if(dataChanged){ state.meta.lastChange = Date.now(); Store.set('mr_meta', JSON.stringify(state.meta)); updateBackupFlag(); }
  const el=document.getElementById('hdrSave'); if(el){ el.textContent='저장중…'; clearTimeout(saveTimer); saveTimer=setTimeout(()=>el.textContent='저장됨 ✓',500);} }
async function loadAll(){
  for(const k of KEYS){
    const raw = await Store.get('mr_'+k);
    if(raw){ try{ state[k]=JSON.parse(raw); }catch(e){} }
  }
  if(!state.meta) state.meta={region:'',lastChange:0,lastBackup:0};
  // 30분 단위 도입에 따른 키 마이그레이션: 'MO-09' → 'MO-09:00'
  if(state.schedule){ let migrated=false; const out={};
    for(const k in state.schedule){ if(/^[A-Z]{2}-\d{2}$/.test(k)){ out[k+':00']=state.schedule[k]; migrated=true; } else out[k]=state.schedule[k]; }
    if(migrated){ state.schedule=out; Store.set('mr_schedule',JSON.stringify(out)); }
  }
}

function needsBackup(){ return (state.meta.lastChange||0) > (state.meta.lastBackup||0); }
function backupAgeText(){
  const t=state.meta.lastBackup||0; if(!t) return '백업한 적 없음';
  const days=Math.floor((Date.now()-t)/86400000);
  if(days<=0) return '오늘 백업함'; if(days===1) return '어제 백업함'; return days+'일 전 백업';
}

  const el=document.getElementById('hdrBackup'); if(!el) return;

}

function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
// 개인정보 보호: 거래처명 마스킹 (켜짐: 가운데 글자 ○ 처리)
function privacyOn(){ return !!(state.meta && state.meta.privacy); }
function maskName(name){
  if(!privacyOn() || !name) return name||'';
  const s=String(name);
  if(s.length<=2) return s[0]+'○';
  if(s.length<=4) return s[0]+'○'.repeat(s.length-2)+s[s.length-1];
  // 긴 병원명: 앞 1~2글자 + ○ + 끝 2글자(과/의원 등 유형 유지)
  return s.slice(0,1)+'○'.repeat(Math.min(s.length-3,3))+s.slice(-2);
}
// 화면 표시용 거래처명 (마스킹 적용)
function dispName(nameOrClient){ const n=(nameOrClient&&typeof nameOrClient==='object')?nameOrClient.name:nameOrClient; return maskName(n); }

function ym(label){ const m=String(label).match(/(\d{4})\D*(\d{1,2})/); return m? m[1]+'-'+String(m[2]).padStart(2,'0') : label; }
function ymLabel(k){ const m=String(k).match(/(\d{4})-(\d{2})/); return m? `${m[1]}년 ${m[2]}월`:k; }
function ymShort(k){ const m=String(k).match(/(\d{4})-(\d{2})/); return m? `${m[1].slice(2)}.${m[2]}`:k; }

/* 영업일 경과율 (주말 제외) */
function bizProgress(d=new Date()){
  const y=d.getFullYear(), m=d.getMonth(); let total=0, passed=0;
  const last=new Date(y,m+1,0).getDate();
  for(let day=1; day<=last; day++){ const wd=new Date(y,m,day).getDay(); if(wd>=1&&wd<=5){ total++; if(day<=d.getDate()) passed++; } }
  return { total, passed, pct: pct(passed,total) };
}

// 라벨로 제품정보 조회(부분일치 허용)
function productInfo(label){ if(!label) return null;
  if(PRODUCT_DB[label]) return PRODUCT_DB[label];
  const k=label.replace(/정$|캡슐$|류$/,'');
  for(const key in PRODUCT_DB){ if(key.includes(k)||k.includes(key)) return PRODUCT_DB[key]; }
  return null;
}
// 키워드 사전 구성: {key(공백제거/류제거), label(원본), groups:[]}
const KW = (()=>{ const map={};
  for(const g of Object.keys(GROUP_DEF)){
    for(const name of GROUP_DEF[g]){
      const key = name.replace(/\s/g,'').replace(/류$/,'');
      if(!map[key]) map[key]={ key, label:name, groups:[] };
      if(!map[key].groups.includes(g)) map[key].groups.push(g);
    }
  }
  return Object.values(map).sort((a,b)=>b.key.length-a.key.length);
})();
function matchItem(itemName){
  const n=String(itemName||'').replace(/\s/g,'');
  let best=null;
  for(const e of KW){ if(n.includes(e.key)){ if(!best||e.key.length>best.key.length) best=e; } }
  return best ? {label:best.label, groups:best.groups.slice()} : {label:null, groups:[]};
}

/* ---------- 4. 엑셀 파싱 ---------- */
function sheetToRows(file, cb){
  const r=new FileReader();
  r.onload=e=>{ const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:''});
    cb(rows); };
  r.readAsArrayBuffer(file);
}
function findHeaderRow(rows, mustHave){
  for(let i=0;i<Math.min(rows.length,15);i++){
    const joined=rows[i].map(c=>String(c)).join('|');
    if(mustHave.some(h=>joined.includes(h))) return i;
  } return 0;
}
function colIndex(header, candidates){
  for(let i=0;i<header.length;i++){ const h=String(header[i]).replace(/\s/g,''); if(candidates.some(c=>h.includes(c))) return i; }
  return -1;
}

/* 거래처조회 파일 파싱 */
function parseClientFile(rows){
  const hi=findHeaderRow(rows,['거래처명','거래처','대표자']);
  const H=rows[hi];
  const ci={ code:colIndex(H,['거래처코드','처코','코드']), name:colIndex(H,['거래처명']), rep:colIndex(H,['대표자']),
    type:colIndex(H,['거래처구분','처구','구분']), biz:colIndex(H,['사업자','자번']), zip:colIndex(H,['우편번호']),
    addr:colIndex(H,['주소']), status:colIndex(H,['거래상태','상태']), wonkey:colIndex(H,['원키']) };
  const out=[];
  for(let i=hi+1;i<rows.length;i++){ const r=rows[i]; if(!r) continue;
    const name = ci.name>=0? String(r[ci.name]||'').trim():'';
    const code = ci.code>=0? String(r[ci.code]||'').trim():'';
    if(!name && !code) continue;
    const addr = ci.addr>=0? String(r[ci.addr]||'').trim():'';
    out.push({ code, name, rep: ci.rep>=0?String(r[ci.rep]||'').trim():'', type: ci.type>=0?String(r[ci.type]||'').trim():'',
      biz: ci.biz>=0?String(r[ci.biz]||'').trim():'', zip: ci.zip>=0?String(r[ci.zip]||'').trim():'',
      address: addr, region: regionOf(addr), status: ci.status>=0?String(r[ci.status]||'').trim():'',
      wonkey: ci.wonkey>=0?String(r[ci.wonkey]||'').trim():'' });
  }
  return out;
}
function regionOf(addr){ if(!addr) return '미지정'; const t=addr.split(/\s+/).filter(Boolean); if(t.length>=2) return t[0]+' '+t[1]; return t[0]||'미지정'; }
// 지역명 → 뚜렷하게 구분되는 색. 거래처에 등장하는 지역 순서대로 고대비 팔레트를 배정(같은 지역=항상 같은 색)
const REGION_PALETTE=[
  {bg:'#dbeafe',border:'#60a5fa',text:'#1d4ed8'}, // 파랑
  {bg:'#fee2e2',border:'#f87171',text:'#b91c1c'}, // 빨강

  {bg:'#cffafe',border:'#22d3ee',text:'#0e7490'}, // 청록
  {bg:'#fce7f3',border:'#f472b6',text:'#be185d'}, // 분홍
  {bg:'#ffedd5',border:'#fb923c',text:'#c2410c'}, // 주황
  {bg:'#e0e7ff',border:'#818cf8',text:'#4338ca'}, // 남보라

  {bg:'#fef9c3',border:'#facc15',text:'#a16207'}, // 라임/노랑
];
let _regionColorMap=null, _regionColorSig='';
function buildRegionColorMap(){
  const regs=[...new Set(state.clients.map(c=>c.region).filter(Boolean))].sort();
  const sig=regs.join('|');
  if(_regionColorMap && _regionColorSig===sig) return _regionColorMap;
  const map={}; regs.forEach((r,i)=> map[r]=REGION_PALETTE[i%REGION_PALETTE.length]);
  _regionColorMap=map; _regionColorSig=sig; return map;
}
function regionColor(region){
  const r=region||'미지정';
  if(r==='미지정') return {bg:'#f1f5f9',border:'#cbd5e1',text:'#64748b'};
  const map=buildRegionColorMap();
  return map[r] || {bg:'#f1f5f9',border:'#cbd5e1',text:'#64748b'};
}

/* 고수익품목(실적) 파일 파싱 */
function parsePerfFile(rows){
  const hi=findHeaderRow(rows,['품목명','거래처명','EDI']);
  const H=rows[hi];
  const ci={ code:colIndex(H,['거래처코드']), wonkey:colIndex(H,['원키']), name:colIndex(H,['거래처명']),
    itemCode:colIndex(H,['품목코드']), edi:colIndex(H,['EDI','edi']), itemName:colIndex(H,['품목명']) };
  // 월 컬럼 탐지
  const monthCols=[]; const months=[];
  for(let i=0;i<H.length;i++){ const m=String(H[i]).match(/(\d{4})\D*(\d{1,2})\s*월/); if(m){ monthCols.push(i); months.push(ym(H[i])); } }
  const out=[];
  for(let i=hi+1;i<rows.length;i++){ const r=rows[i]; if(!r) continue;
    const itemName = ci.itemName>=0? String(r[ci.itemName]||'').trim():'';
    const cname = ci.name>=0? String(r[ci.name]||'').trim():'';
    if(!itemName && !cname) continue;
    const monthly={};
    monthCols.forEach((c,idx)=>{ let v=r[c]; v=(typeof v==='number')? v : parseFloat(String(v).replace(/[, ]/g,''))||0; monthly[months[idx]]=v; });
    const mm=matchItem(itemName);
    out.push({ code: ci.code>=0?String(r[ci.code]||'').trim():'', wonkey: ci.wonkey>=0?String(r[ci.wonkey]||'').trim():'',
      name: cname, itemCode: ci.itemCode>=0?String(r[ci.itemCode]||'').trim():'', edi: ci.edi>=0?String(r[ci.edi]||'').trim():'',
      itemName, label:mm.label, groups:mm.groups, monthly });
  }
  const sortedMonths=[...new Set(months)].sort();
  return { months:sortedMonths, latest:sortedMonths[sortedMonths.length-1]||null, prev:sortedMonths[sortedMonths.length-2]||null, rows:out };
}

/* ---------- 5. 집계 계산 ---------- */
// 거래처별 특정월 처방액 (모든 품목 합)
function clientRx(codeOrName, month){
  if(!state.perf||!month) return 0; let sum=0;
  for(const r of state.perf.rows){ if((r.code&&r.code===codeOrName.code)||(r.name&&r.name===codeOrName.name)) sum+=(r.monthly[month]||0); }
  return sum;
}
// 거래처 마스터에 현재 처방액/링크 갱신
function recomputeClientRx(){
  if(!state.perf) return; const L=state.perf.latest, P=state.perf.prev;
  for(const c of state.clients){ c.currentRx=clientRx(c,L); c.prevRx=clientRx(c,P); }
}
// 품목군별 월 합계
function groupTotals(month){
  const t={'가':0,'나':0,'전략':0,'기타':0};
  if(!state.perf||!month) return t;
  for(const r of state.perf.rows){ const v=(r.monthly&&r.monthly[month])||0; if(!v) continue;
    const gs=r.groups||[]; if(gs.length){ gs.forEach(g=> t[g]=(t[g]||0)+v ); } else t['기타']+=v; }
  return t;
}
// 품목군 내 품목별 합계 (key=label)
function itemsInGroup(group, month, prev){
  const map={};
  if(!state.perf) return [];
  for(const r of state.perf.rows){ if(!(r.groups||[]).includes(group)) continue;
    const k=r.label||r.itemName; if(!map[k]) map[k]={label:k, cur:0, prev:0};
    map[k].cur+=(r.monthly[month]||0); map[k].prev+=(r.monthly[prev]||0); }
  return Object.values(map).sort((a,b)=>b.cur-a.cur);
}
// 전체 월 매출(실적) = 모든 품목 합
function monthTotalAll(month){ if(!state.perf||!month) return 0; let s=0; for(const r of state.perf.rows) s+=(r.monthly[month]||0); return s; }

/* ---------- 5b. 분석 엔진 (추세 / 하락감지 / 우선순위 / 예측) ---------- */
// 거래처별 전체 월 시계열 [{m,v}]
function clientSeries(c){
  if(!state.perf) return [];
  return state.perf.months.map(m=>({ m, v:clientRx(c,m) }));
}
// 최근 연속 하락 개월 수 + 추세 판정
function declineInfo(c){
  const s=clientSeries(c); if(s.length<2) return {streak:0, trend:'flat', dropPct:0, series:s};
  let streak=0;
  for(let i=s.length-1;i>0;i--){ if(s[i].v < s[i-1].v && s[i-1].v>0) streak++; else break; }
  const last=s[s.length-1].v, base=s[Math.max(0,s.length-4)].v; // 최근 vs 3개월 전
  const dropPct = base>0 ? Math.round((last-base)/base*100) : 0;
  let trend='flat';
  if(streak>=2 || dropPct<=-20) trend='down';
  else if(s[s.length-1].v > s[s.length-2].v*1.1) trend='up';
  return {streak, trend, dropPct, series:s, last, base};
}
// 하락 거래처 목록 (위험도순)
function decliningClients(){
  if(!state.perf) return [];
  return state.clients.map(c=>({c, info:declineInfo(c)}))
    .filter(o=> o.c.currentRx>0 && (o.info.streak>=2 || o.info.dropPct<=-20))
    .sort((a,b)=> (a.info.dropPct - b.info.dropPct) || (b.c.currentRx - a.c.currentRx));
}
// 거래처 마지막 방문일 (방문로그 기준)
function lastVisitOf(c){
  let d=null;
  for(const v of state.visits){ if((v.clientCode&&v.clientCode===c.code)||v.clientName===c.name){ if(!d||v.date>d) d=v.date; } }
  return d;
}
function daysSince(dateStr){ if(!dateStr) return null; const ms=Date.now()-new Date(dateStr+'T00:00:00').getTime(); return Math.floor(ms/86400000); }
// 우선 방문 점수: 등급 가중 × 하락신호 × 미방문 경과
function visitPriority(){
  const gradeW={A:5,B:4,C:3,D:2,E:1,'':2};
  const out=state.clients.map(c=>{
    const info=declineInfo(c);
    const last=lastVisitOf(c); const since=daysSince(last);
    let score = (gradeW[(c.grade||'').toUpperCase()]||2) * 10;
    if(info.trend==='down') score += 40;          // 하락 거래처 강한 가중
    if(info.streak>=3) score += 15;
    if(since==null) score += 18;                   // 한 번도 기록 안 됨
    else score += Math.min(since,60)*0.6;          // 오래될수록 ↑ (최대 60일)
    score += Math.min((c.currentRx||0)/1_000_000, 20); // 규모 보정
    return { c, info, last, since, score };
  }).filter(o=>o.c.currentRx>0 || (o.c.grade&&o.c.grade!=='E'));
  return out.sort((a,b)=>b.score-a.score);
}
// 월말 실적 예측 (영업일 경과율 기반 선형 추정)
function paceForecast(){
  if(!state.perf) return null;
  const L=state.perf.latest; const actual=monthTotalAll(L);
  const bp=bizProgress(); // {pct, passed, total}
  if(!bp||bp.pct<=0) return null;
  const projected = Math.round(actual / (bp.pct/100));
  const tgt=(state.targets&&state.targets[L]&&+state.targets[L].target)||0;
  return { actual, projected, target:tgt, pct:bp.pct, ratio: tgt? Math.round(projected/tgt*100):null };
}

function topItemsOf(c){ if(!state.perf) return []; const L=state.perf.latest; const m={};
  state.perf.rows.forEach(r=>{ if((r.code&&r.code===c.code)||(r.name&&r.name===c.name)){ const v=r.monthly[L]||0; if(v) m[r.itemName]=(m[r.itemName]||0)+v; } });
  return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]); }

// 거래처 제품 프로파일: 품목군별 처방액, 사용 중인 우리 품목(라벨), 미사용 포트폴리오 후보
function clientProductProfile(c){
  const prof={ byGroup:{'가':0,'나':0,'전략':0,'기타':0}, usedLabels:new Set(), items:[] };
  if(state.perf){ const L=state.perf.latest;
    for(const r of state.perf.rows){ if(!((r.code&&r.code===c.code)||(r.name&&r.name===c.name))) continue;
      const v=r.monthly[L]||0; if(!v) continue;
      const gs=(r.groups&&r.groups.length)?r.groups:['기타'];
      gs.forEach(g=> prof.byGroup[g]=(prof.byGroup[g]||0)+v );
      if(r.label) prof.usedLabels.add(r.label);
      prof.items.push({ name:r.itemName, label:r.label||null, groups:gs, amount:v });
    }
  }
  prof.items.sort((a,b)=>b.amount-a.amount);
  // 강한 품목군(처방액 상위, 0 초과)
  prof.strongGroups=Object.entries(prof.byGroup).filter(([g,v])=>v>0&&g!=='기타').sort((a,b)=>b[1]-a[1]).map(([g])=>g);
  // 미사용 포트폴리오 후보: 강한 군에 속하지만 아직 안 쓰는 우리 품목
  const cand=[];
  for(const g of prof.strongGroups){ for(const name of (GROUP_DEF[g]||[])){ const key=name.replace(/\s/g,'').replace(/류$/,'');
    if(!prof.usedLabels.has(name) && !cand.includes(name)) cand.push(name); } }
  prof.candidates=cand.slice(0,8);
  return prof;
}
// 방문 메모에서 경쟁사/선호약물/약가 단서 추출
function extractNoteSignals(note){
  const n=note||''; const sig={ cost:false, competitor:false, efficacy:false, safety:false, adherence:false, switch:false };
  if(/약가|약값|보험|삭감|본인부담|비용|가격|싸|저렴|비싸/.test(n)) sig.cost=true;
  if(/경쟁|타사|오리지널|제네릭|리피토|크레스토|노바스크|아모잘탄|딜라트렌|타사약|경쟁사/.test(n)) sig.competitor=true;
  if(/효과|효능|혈압|혈당|LDL|콜레스테롤|수치|조절|강하/.test(n)) sig.efficacy=true;
  if(/부작용|안전|간수치|근육통|내약|이상반응|고령|노인/.test(n)) sig.safety=true;
  if(/복약|순응|복용|하루|1일|1정|편의|복합제|combo|병용/.test(n)) sig.adherence=true;
  if(/스위칭|전환|변경|바꾸|교체|추가/.test(n)) sig.switch=true;
  return sig;
}

/* ---- 퇴근 보고 ---- */
function todayISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
// 활동 의미도 점수화 — 유의미한 거래처만 보고에 포함
const REPORT_KEYWORDS = {
  strong: ['스위칭','개척','성공','처방 시작','처방시작','처방 확인','처방확인','신규','점심','제품설명회','PMS','심포지엄','계약','거래시작'],
  mid: ['증량','고려','진행','디테일 메시지','디테일메시지','판촉','제안','요청','출시','컨택','면담','약속','약 변경','추가 처방','추가처방','메세지 전달','메시지 전달'],
  weak: ['안내','전달','상담','디테일','문의','확인','감사'],
  zero: ['수금','통계회수','통계 회수','인사만','부재','자리에 안 계심','자리 비움','퇴근']
};
function scoreActivity(text){
  if(!text) return 0;
  const t=String(text).toLowerCase().replace(/\s/g,'');
  let score=0; let hasStrong=false, hasMid=false;
  for(const kw of REPORT_KEYWORDS.strong){ if(t.includes(kw.toLowerCase().replace(/\s/g,''))){ score+=3; hasStrong=true; } }
  for(const kw of REPORT_KEYWORDS.mid){ if(t.includes(kw.toLowerCase().replace(/\s/g,''))){ score+=2; hasMid=true; } }
  for(const kw of REPORT_KEYWORDS.weak){ if(t.includes(kw.toLowerCase().replace(/\s/g,''))) score+=1; }
  // 0점 키워드만 있으면 감점 (수금·인사만 등은 보고 가치 낮음)
  let zeroOnly=true;
  for(const kw of REPORT_KEYWORDS.zero){ if(t.includes(kw.toLowerCase().replace(/\s/g,''))) { if(!hasStrong && !hasMid && score===0) score=0; } }
  return score;
}
// 본문 다듬기: 의미 있는 문장만 추리고 군더더기 제거
function trimNote(s){
  if(!s) return '';
  // 줄바꿈/마침표 단위로 자르되, 숫자 사이의 점(7.5)은 보호
  // 임시 토큰으로 치환 → 분리 → 복원
  const protect=String(s).replace(/(\d)\.(\d)/g,'$1__DOT__$2');
  const sentences=protect.split(/[\n.]+/).map(x=>x.replace(/__DOT__/g,'.').trim()).filter(Boolean);
  const scored=sentences.map(x=>({t:x, s:scoreActivity(x)}));
  const anyMeaningful=scored.some(o=>o.s>0);
  const kept = anyMeaningful ? scored.filter(o=>o.s>0).map(o=>o.t) : sentences;
  return kept.join('. ').replace(/\.\s*\./g,'.').trim();
}
function buildDailyReport(){
  const today=todayISO();
  const todays=(state.visits||[]).filter(v=>v.date===today);
  // 거래처별 집계 + 점수 산정
  const byClient=new Map();
  for(const v of todays){
    const k=v.clientName||'(이름없음)';
    if(!byClient.has(k)) byClient.set(k,{name:k, notes:[], devs:[], score:0});
    const e=byClient.get(k);
    if(v.note&&v.note.trim()){ e.notes.push(v.note.trim()); e.score+=scoreActivity(v.note); }
    (v.developed||[]).forEach(d=>{ if(d.item){ e.devs.push(`${d.item}${d.amount?'('+d.amount.toLocaleString()+'원)':''} 개척`); e.score+=3; } });
  }
  // 점수 높은 순으로 정렬, 0점은 제외, 최대 5처
  const ranked=[...byClient.values()].filter(e=>e.score>0).sort((a,b)=>b.score-a.score).slice(0,5);
  // 활동 줄 만들기 (요약된 본문)
  const lines3=[];
  for(const e of ranked){
    const trimmed=e.notes.map(trimNote).filter(Boolean);
    const devTxt=e.devs.join(', ');
    const parts=[];
    if(trimmed.length) parts.push(trimmed.join('\n'));
    if(devTxt) parts.push(devTxt);
    const body=parts.join('\n').trim();
    if(!body) continue;
    if(body.indexOf('\n')<0 && body.length<=45){ lines3.push(`${maskName(e.name)}- ${body}`); }
    else { lines3.push(`${maskName(e.name)}\n${body}`); }
  }
  // 5번: 도네리온 관련만 (점수 무관 — 전체 visits에서 추출)
  const lines5=[];
  for(const e of byClient.values()){
    const blob=(e.notes.join(' ')+' '+e.devs.join(' ')).toLowerCase();
    if(blob.includes('도네리온')||blob.includes('donerion')){
      const hit=[];
      e.notes.forEach(n=>{ n.split(/[\n.]+/).forEach(ln=>{ const tt=ln.trim(); if(tt&&tt.toLowerCase().includes('도네리온')) hit.push(tt); }); });
      e.devs.forEach(d=>{ if(d.toLowerCase().includes('도네리온')) hit.push(d); });
      const txt=hit.length?hit.join(', '):e.notes.join(' ').slice(0,80);
      lines5.push(`${maskName(e.name)}- ${txt}`);
    }
  }
  // 제외된 거래처 수 (참고용 안내)
  const skipped=byClient.size-ranked.length;
  const body3=lines3.length?lines3.join('\n\n'):'(유의미한 활동이 인식되지 않았습니다)';
  const body5=lines5.length?lines5.join('\n'):'';
  const footer=skipped>0?`\n\n※ 단순 수금·인사 등 ${skipped}개 거래처 활동은 보고서에서 자동 제외됨`:'';
  return [
    '(퇴근 보고)',
    '3. 오늘 성과(퇴근시 추가)',
    body3,
    '',
    '4. 오늘 이슈(타사 동향 등)',
    '',
    '',
    '5. 도네리온 타겟처 활동',
    body5,
  ].join('\n')+footer;
}

async function aiAPI(c,note){
  const prof=clientProductProfile(c); const sig=extractNoteSignals(note);
  const sys=`너는 제약회사 MR(영업담당)의 베테랑 영업 코치다. 거래처의 실제 처방 데이터와 방문 메모를 교차 분석해, 우리 회사 제품 중 무엇을 어떤 논리로 디테일할지 한국어로 구체적이고 실전적으로 코칭한다. 반드시 아래 JSON 형식만 출력하라(마크다운/설명 금지):
{"summary":"이번 방문의 성과와 핵심 문제점(2~3문장)","psych":"거래처 성향 매칭 및 원장 심리 분석(2~3문장)","detail":["우리 제품명 — 강조할 디테일 측면(효과/안전성/약가/복약편의 등)과 근거 한 줄","제품2 — 디테일 포인트","..."],"action":["차기 방문 필수 액션","준비물/자료 추천"]}
detail은 거래처가 이미 강하게 처방하는 품목군과 방문 메모의 단서(경쟁사/약가/선호)를 근거로, 우리 제품 중 실제로 제안 가능한 것을 2~4개 골라 '왜 이 거래처에 이 제품을, 어떤 측면으로' 설명할지 제시하라.`;
  const u=`[거래처] ${c.name}\n[등급] ${c.grade||'미지정'}\n[성향] ${c.disposition||'미파악'}\n[현재 처방액] ${fmt(c.currentRx||0)}원\n[품목군별 처방액] 가:${fmt(prof.byGroup['가'])} / 나:${fmt(prof.byGroup['나'])} / 전략:${fmt(prof.byGroup['전략'])} / 기타:${fmt(prof.byGroup['기타'])}\n[강한 품목군] ${prof.strongGroups.join(', ')||'없음'}\n[이미 처방 중인 우리 품목] ${[...prof.usedLabels].join(', ')||'없음'}\n[상위 처방 품목] ${prof.items.slice(0,5).map(i=>i.name).join(', ')||'없음'}\n[제안 가능한 미사용 우리 품목] ${prof.candidates.join(', ')||'없음'}\n[메모 단서] ${Object.entries(sig).filter(([k,v])=>v).map(([k])=>k).join(', ')||'특이단서 없음'}\n[방문 메모] ${note}`;
  let res;
  const payload={model:"claude-sonnet-4-20250514",max_tokens:1200,messages:[{role:"user",content:sys+"\n\n"+u}]};
  try{ res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
  }catch(netErr){ throw new Error('[fetch단계] '+(netErr&&netErr.message||netErr)); }
  if(!res||typeof res.ok==='undefined'){ throw new Error('[응답객체없음] '+String(res).slice(0,80)); }
  if(!res.ok){ let body=''; try{ body=(await res.text()).slice(0,150); }catch(_){} throw new Error('[HTTP '+res.status+'] '+body); }
  let data;
  try{ data=await res.json(); }catch(jErr){ let raw=''; try{ raw=(await res.text()).slice(0,150); }catch(_){} throw new Error('[JSON파싱실패] '+(jErr.message||'')+' raw='+raw); }
  let txt=(data.content||[]).map(b=>b.text||'').join('').trim().replace(/```json|```/g,'').trim();
  if(!txt){ throw new Error('[빈응답] '+JSON.stringify(data).slice(0,150)); }
  const s=txt.indexOf('{'), e=txt.lastIndexOf('}'); if(s>=0&&e>s) txt=txt.slice(s,e+1);
  let o; try{ o=JSON.parse(txt); }catch(pErr){ throw new Error('[결과JSON불량] '+txt.slice(0,100)); }
  return { summary:o.summary||'', psych:o.psych||'', detail:Array.isArray(o.detail)?o.detail:(o.detail?[String(o.detail)]:[]), action:Array.isArray(o.action)?o.action:[String(o.action||'')], engine:'AI' };
}
function ruleBasedFeedback(c,note){
  const n=note; const has=(...k)=>k.some(w=>n.includes(w));
  let summary=[], psych=[], action=[];
  if(has('바쁨','바빠','시간없','짧게','문전')) summary.push('원장 응대 시간이 짧아 핵심 메시지 전달이 제한된 방문이었습니다.');
  if(has('리플렛','자료','논문','전달')) summary.push('논문/리플렛 자료 전달은 완료되어 다음 디테일의 근거를 확보했습니다.');
  if(has('경쟁사','경쟁','타사')) summary.push('경쟁사 품목에 대한 관심이 확인되어 방어/대응 논리가 필요합니다.');
  if(has('처방','늘','증량','확대','시작')) summary.push('처방 확대 신호가 포착되어 후속 클로징이 중요합니다.');
  if(!summary.length) summary.push('방문은 진행되었으나 명확한 성과 지표가 약해, 다음 방문 목표를 구체화할 필요가 있습니다.');

  const d=c.disposition||'';
  if(d.includes('데이터')) psych.push('데이터 중심 성향이므로 임상논문·RCT·가이드라인 근거를 수치로 제시하면 신뢰가 올라갑니다.');
  else if(d.includes('관계')) psych.push('관계 중심 성향이므로 라포 형성과 작은 약속의 이행이 처방 전환의 핵심입니다.');
  else if(d.includes('보수')) psych.push('보수적 성향이므로 안전성·장기 데이터와 동료 처방 사례로 위험 인식을 낮추세요.');
  else if(d.includes('가격')) psych.push('가격 민감 성향이므로 환자 본인부담·약가 우위와 비용효과 데이터를 강조하세요.');
  else psych.push('성향이 미파악 상태입니다. 이번 응대 톤을 관찰해 데이터형/관계형/보수형 중 어디에 가까운지 분류해 두세요.');
  if(has('경쟁사','경쟁','타사')) psych.push('경쟁사 관심은 곧 비교 검토 중이라는 신호이므로, 차별점(효과/순응도/약가)을 한 장으로 정리해 선제 대응하세요.');

  if(has('경쟁사','효과','부작용')) action.push('경쟁사 대비 우위 1-pager(효과·안전성·약가) 준비해 전달');
  if(has('바쁨','시간없','짧게')) action.push('30초 핵심 메시지(One-key message) 스크립트 준비');
  if(has('리플렛','논문')) action.push('전달한 논문의 핵심 결과를 다음 방문에서 1분 요약 디테일');
  action.push(`${c.grade==='A'||c.grade==='B'?'핵심 거래처인 만큼':'성장 여지가 있으므로'} 집중품목(${c.focus||topItemsOf(c).join(', ')||'주력 품목'}) 처방 현황 질문 준비`);
  action.push('차기 방문 D-Day 확정 및 샘플/판촉물 재고 점검');

  // ④ 제품 디테일 전략: 처방 데이터 × 메모 단서 교차
  const prof=clientProductProfile(c); const sig=extractNoteSignals(note);
  let angle = sig.cost?'약가·본인부담 우위와 비용효과':
              sig.safety?'안전성·내약성(고령/장기 복용 근거)':
              sig.adherence?'복약 편의(복합제·1일 1회)':
              sig.competitor?'경쟁사 대비 차별점(효과·순응도·약가)':
              sig.efficacy?'효과·수치 개선 근거(임상 데이터)':
              (c.disposition||'').includes('데이터')?'임상논문·가이드라인 근거':
              (c.disposition||'').includes('가격')?'약가·비용효과':'효과와 복약편의';
  const detail=[];
  if(prof.strongGroups.length){
    const g=prof.strongGroups[0];
    detail.push(`이 거래처는 '${g}군'을 가장 많이 처방(${fmt(prof.byGroup[g])}원)합니다. 같은 ${g}군 우리 품목을 ${angle} 측면으로 디테일하면 처방 전환 가능성이 높습니다.`);
    if(prof.candidates.length){
      detail.push(`제안 후보: ${prof.candidates.slice(0,4).join(', ')} — 이미 ${g}군을 쓰는 거래처라 도입 저항이 낮습니다. ${angle}을(를) 중심으로 접근하세요.`);
    }
  } else {
    detail.push(`아직 우리 품목군 처방이 미미합니다. 진입 품목으로 전략품목(${(GROUP_DEF['전략']||[]).slice(0,3).join(', ')}) 중 하나를 ${angle} 측면으로 제안해 첫 처방을 유도하세요.`);
  }
  if([...prof.usedLabels].length){
    detail.push(`이미 처방 중: ${[...prof.usedLabels].slice(0,4).join(', ')} — 증량/적응증 확대 또는 동일 계열 추가 처방을 ${angle}(으)로 디테일하세요.`);
  }
  if(sig.competitor) detail.push('메모에 경쟁사 언급 → 해당 성분의 우리 대응 품목 차별점(효과·약가·순응도)을 한 장으로 정리해 선제 대응하세요.');

  return { summary:summary.join(' '), psych:psych.join(' '), detail, action, engine:'룰' };
}

function devTrack(d){ if(!state.perf) return {cur:0,prev:0}; const L=state.perf.latest,P=state.perf.prev; let cur=0,prev=0;

function clearSchedule(){ if(!confirm('주간 계획을 모두 비울까요?'))return; state.schedule={}; persist(['schedule']); renderSchedule(); }
// 같은 요일 안에서 targetKey 위치부터 아래로 한 칸씩 밀기 (빈 칸 만날 때까지)
// 20시(마지막 칸)를 넘기는 항목은 제거하고 개수를 반환
function pushDownSlots(targetKey){
  const [dk,hm]=targetKey.split('-');
  // 해당 요일의 슬롯 시간 키 배열 (HH:MM 순서)
  const slotTimes=HOURS.map(s=>String(s.h).padStart(2,'0')+':'+String(s.m).padStart(2,'0'));
  const startIdx=slotTimes.indexOf(hm);
  if(startIdx<0) return 0;
  // target부터 아래로 가며 첫 빈 칸을 찾음 (전부 차 있으면 -1)
  let emptyIdx=-1;
  for(let i=startIdx;i<slotTimes.length;i++){
    const k=dk+'-'+slotTimes[i];
    if(!state.schedule[k]){ emptyIdx=i; break; }
  }
  let dropped=0;
  if(emptyIdx<0){
    // 전부 차 있음 → 마지막 칸 항목은 사라짐
    const lastKey=dk+'-'+slotTimes[slotTimes.length-1];
    if(state.schedule[lastKey]){ delete state.schedule[lastKey]; dropped=1; }
    emptyIdx=slotTimes.length-1;
  }
  // emptyIdx에서 startIdx까지 거꾸로 한 칸씩 위 항목을 끌어내림
  for(let i=emptyIdx;i>startIdx;i--){
    const here=dk+'-'+slotTimes[i]; const prev=dk+'-'+slotTimes[i-1];
    state.schedule[here]=state.schedule[prev];
    delete state.schedule[prev];
  }
  return dropped;
}

      <div class="soft p-2.5 text-center"><div class="text-[10px] text-slate-400">채권잔액</div><div class="text-[15px] font-extrabold tnum text-slate-700">${fmtK(sumBal)}<span class="text-[11px] text-red-500"> · 연체 ${fmtK(sumOver)}</span></div></div>`;

    if(!f.length){ box.innerHTML=`<div class="text-center text-sm text-slate-400 py-8">해당 항목이 없습니다</div>`; return; }

function addToWaitlist(code,name){
  if(!state.waitlist) state.waitlist=[];
  if(state.waitlist.some(x=>(x.code&&code&&x.code===code)||x.name===name)) return; // 중복 방지
  const f=state.clients.find(c=>(c.code&&code&&c.code===code)||c.name===name)||{};
  state.waitlist.push({ code:code||'', name, grade:f.grade||'', region:f.region||'' });
  persist(['waitlist']); renderSchedule();
}
function removeFromWaitlist(code,name){
  if(!state.waitlist) return;
  state.waitlist=state.waitlist.filter(x=>!((x.code&&code&&x.code===code)||x.name===name));
  persist(['waitlist']); renderSchedule();
}

/* 포인터 기반 드래그앤드롭 */
let drag=null;
function bindDnD(){
  document.querySelectorAll('.chip-drag').forEach(ch=>{ ch.onpointerdown=startDrag; });
}
function startDrag(e){
  e.preventDefault(); e.stopPropagation();
  const el=e.currentTarget;
  document.body.classList.add('dragging');
  try{ el.setPointerCapture(e.pointerId); }catch(_){}
  drag={ code:el.dataset.code, name:el.dataset.name, src:el.dataset.src, fromSlot:el.dataset.slot||null, ghost:null, over:null, pid:e.pointerId, srcEl:el };
  const g=el.cloneNode(true); g.classList.add('ghost'); document.body.appendChild(g); drag.ghost=g;
  moveGhost(e);
  // 포인터 캡처 대상(칩)에서 직접 이동/종료를 듣는다 — 캡처 중에는 이 요소로 이벤트가 전달됨
  el.addEventListener('pointermove',onDrag);
  el.addEventListener('pointerup',endDrag);
  el.addEventListener('pointercancel',endDrag);
  window.addEventListener('pointermove',onDrag); window.addEventListener('pointerup',endDrag);
}
function moveGhost(e){ if(drag&&drag.ghost){ drag.ghost.style.left=e.clientX+'px'; drag.ghost.style.top=e.clientY+'px'; } }
function onDrag(e){ if(!drag) return; e.preventDefault(); moveGhost(e);
  if(drag.ghost) drag.ghost.style.display='none';
  const el=document.elementFromPoint(e.clientX,e.clientY);
  if(drag.ghost) drag.ghost.style.display='';
  const slot=el?el.closest('.slot'):null; const trash=el?el.closest('#trash'):null; const wait=el?el.closest('#waitDrop'):null;
  document.querySelectorAll('.slot.dragover').forEach(s=>s.classList.remove('dragover'));
  const t=$('#trash'); const w=$('#waitDrop');
  if(t)t.style.background=''; if(w)w.style.background='';
  if(trash){ if(t)t.style.background='#fee2e2'; drag.over={type:'trash'}; }
  else if(wait){ if(w)w.style.background='#dcfce7'; drag.over={type:'wait'}; }
  else if(slot){ slot.classList.add('dragover'); drag.over={type:'slot',key:slot.dataset.slot}; }
  else drag.over=null;
}
function endDrag(e){
  if(!drag) return;
  const sEl=drag.srcEl;
  if(sEl){ try{ sEl.releasePointerCapture(drag.pid); }catch(_){}
    sEl.removeEventListener('pointermove',onDrag); sEl.removeEventListener('pointerup',endDrag); sEl.removeEventListener('pointercancel',endDrag); }
  window.removeEventListener('pointermove',onDrag); window.removeEventListener('pointerup',endDrag);
  document.body.classList.remove('dragging');
  const t=$('#trash'); if(t)t.style.background=''; const w=$('#waitDrop'); if(w)w.style.background='';
  if(drag.ghost) drag.ghost.remove();
  const o=drag.over;
  if(o){
    if(o.type==='trash'){ if(drag.fromSlot){ delete state.schedule[drag.fromSlot]; persist(['schedule']); } else if(drag.src==='wait'){ removeFromWaitlist(drag.code,drag.name); } }
    else if(o.type==='wait'){ addToWaitlist(drag.code,drag.name); }
    else if(o.type==='slot'){
      // 같은 칸으로 다시 떨어뜨린 경우는 변화 없음
      if(drag.fromSlot===o.key){ /* no-op */ }
      else {
        // 다른 슬롯에서 온 경우, 원래 위치를 먼저 비움 (같은 요일이면 cascade 시 빈 칸이 됨)
        if(drag.fromSlot) delete state.schedule[drag.fromSlot];
        // 타겟이 차 있으면 아래로 밀어내기
        let dropped=0;
        if(state.schedule[o.key]) dropped=pushDownSlots(o.key);
        // 새 항목 배치
        state.schedule[o.key]=(()=>{ const f=state.clients.find(c=>(c.code&&c.code===drag.code)||c.name===drag.name)||{}; return { code:drag.code, name:drag.name, grade:f.grade||'', region:f.region||'' }; })();
        persist(['schedule']);
        if(dropped>0) setTimeout(()=>toast(`마지막 시간(20시)을 넘어 ${dropped}건 사라짐`),100);
      }
    }
  }
  drag=null;
  // 드롭 후 스크롤 위치 보존 (재렌더 시 첫 셀로 튕기는 현상 방지)
  const sx=document.querySelector('#view-schedule .scroll-x');
  const sl=sx?sx.scrollLeft:0; const sy=window.scrollY||window.pageYOffset||0;
  renderSchedule();
  requestAnimationFrame(()=>{ const nx=document.querySelector('#view-schedule .scroll-x'); if(nx) nx.scrollLeft=sl; window.scrollTo(0,sy); });
}

function mergeClients(parsed){
  const byKey={}; state.clients.forEach(c=>{ byKey[c.code||c.name]=c; });
  parsed.forEach(p=>{ const k=p.code||p.name; const ex=byKey[k];
    if(ex){ Object.assign(ex,{ name:p.name||ex.name, rep:p.rep||ex.rep, type:p.type||ex.type, biz:p.biz, zip:p.zip, address:p.address||ex.address, region:p.region||ex.region, status:p.status, wonkey:p.wonkey, code:p.code||ex.code }); }
    else { state.clients.push({ ...p, grade:'', disposition:'', targetQty:'', targetSales:'', visitCount:0, focus:'' }); byKey[k]=p; }
  });
}

/* 수금 명단 파일 파서 — 헤더 자동 인식 (거래처명·실액채권잔액·실액회전일수·연체채권) */
function parseCollectionFile(rows){
  if(!rows||!rows.length) return {rows:[]};
  // 헤더 행 자동 탐색(상위 8행 내)
  let hdrIdx=-1, nameCol=-1, balCol=-1, turnCol=-1, overdueCol=-1;
  for(let i=0;i<Math.min(rows.length,8);i++){ const r=(rows[i]||[]).map(c=>String(c||'').trim());
    let nc=-1, bc=-1, tc=-1, oc=-1;
    r.forEach((v,j)=>{
      const s=v.replace(/\s/g,'');
      // 거래처코드는 제외
      if(nc<0 && /거래처명|병원명|업체명|상호명|^거래처$|^병원$/.test(s) && !/코드/.test(s)) nc=j;
      if(bc<0 && /실액.*채권.*잔액|채권잔액|미수금액|미수잔액|잔액/.test(s)) bc=j;
      if(tc<0 && /실액.*회전.*일|회전일수|회전일|회전기간/.test(s)) tc=j;
      if(oc<0 && /연체.*채권|연체금|연체액|연체$/.test(s)) oc=j;
    });
    if(nc>=0 && (bc>=0||tc>=0)){ hdrIdx=i; nameCol=nc; balCol=bc; turnCol=tc; overdueCol=oc; break; }
  }
  if(hdrIdx<0) return {rows:[]};
  const num=v=>{ const s=String(v||'').replace(/[, ₩원]/g,'').trim(); const n=parseFloat(s); return isNaN(n)?0:n; };
  const out=[];
  for(let i=hdrIdx+1;i<rows.length;i++){ const r=rows[i]||[];
    const name=String(r[nameCol]||'').trim(); if(!name||/^합계|^총계|^계$/.test(name)) continue;
    out.push({
      name,
      balance: balCol>=0?num(r[balCol]):0,
      turnover: turnCol>=0?num(r[turnCol]):0,
      overdue: overdueCol>=0?num(r[overdueCol]):0,
      checked:false
    });
  }
  return {rows:out};
}
function onCollectionFile(input){ const f=input.files[0]; if(!f)return;
  sheetToRows(f,rows=>{ try{ const p=parseCollectionFile(rows); if(!p.rows.length){toast('수금 명단을 인식하지 못했습니다 (거래처명·금액 컬럼 확인)');return;}
    const d=new Date(); const ym=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    state.collection={ym, rows:p.rows}; persist(['collection']); renderData(); toast(`수금 명단 ${p.rows.length}곳 등록 (기존 체크 초기화)`); }
    catch(e){ toast('파일 분석 오류: 형식을 확인하세요'); console.error(e);} });
  input.value='';
}

}

/* CSV 유틸 */
function csvRow(arr){ return arr.map(x=>{ x=(x==null?'':String(x)); return /[",\n]/.test(x)?'"'+x.replace(/"/g,'""')+'"':x; }).join(','); }
function download(name,content,type){ const blob=new Blob([content],{type:type||'text/csv;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }
function exportClients(){ const head=['거래처코드','거래처명','담당자','구분','성향','등급','지역','목표수량','목표매출','누적방문','현재처방액'];
  const rows=state.clients.map(c=>[c.code,c.name,c.rep,c.type,c.disposition,c.grade,c.region,c.targetQty,c.targetSales,c.visitCount,c.currentRx||0]);
  download('거래처마스터.csv','\uFEFF'+[csvRow(head),...rows.map(csvRow)].join('\r\n')); toast('거래처 CSV를 내보냈습니다'); }
function exportVisits(){ const head=['날짜','거래처','방문내용','차기방문','성과요약','심리분석','제품디테일전략','액션플랜','개척품목'];
  const rows=state.visits.map(v=>[v.date,v.clientName,v.note,v.nextDate,v.feedback?.summary,v.feedback?.psych,(v.feedback?.detail||[]).join(' / '),(v.feedback?.action||[]).join(' / '),(v.developed||[]).map(d=>d.item+'('+d.amount+')').join(' / ')]);
  download('방문로그.csv','\uFEFF'+[csvRow(head),...rows.map(csvRow)].join('\r\n')); toast('방문로그 CSV를 내보냈습니다'); }
function exportDevs(){ const head=['거래처','품목','개척금액','개척일','상태','현재처방','전월','팔로업'];
  const rows=state.devs.map(d=>{ const t=devTrack(d); return [d.clientName,d.item,d.amount,d.date,d.status||'진행중',t.cur,t.prev,d.followup||'']; });
  download('개척기록.csv','\uFEFF'+[csvRow(head),...rows.map(csvRow)].join('\r\n')); toast('개척기록 CSV를 내보냈습니다'); }
function exportPerf(){ if(!state.perf){toast('실적 데이터가 없습니다');return;} const m=state.perf.months; const head=['거래처코드','거래처명','품목명','품목군',...m.map(ymLabel)];
  const rows=state.perf.rows.map(r=>[r.code,r.name,r.itemName,r.groups.join('/')||'기타',...m.map(k=>r.monthly[k]||0)]);
  download('실적_품목별.csv','\uFEFF'+[csvRow(head),...rows.map(csvRow)].join('\r\n')); toast('실적 CSV를 내보냈습니다'); }
function exportBackup(){ const obj={}; KEYS.forEach(k=>obj[k]=state[k]);
  state.meta.lastBackup=Date.now(); Store.set('mr_meta',JSON.stringify(state.meta)); updateBackupFlag(); if(activeTab==='data') renderData();
  download('MR비서_백업_'+new Date().toISOString().slice(0,10)+'.json',JSON.stringify(obj),'application/json'); toast('백업 파일을 내보냈습니다'); }
function importBackup(input){ const f=input.files[0]; if(!f)return; const r=new FileReader(); r.onload=e=>{ try{ const o=JSON.parse(e.target.result); KEYS.forEach(k=>{ if(o[k]!==undefined) state[k]=o[k]; }); if(!state.meta) state.meta={region:'',lastChange:0,lastBackup:0}; state.meta.lastBackup=Date.now(); state.meta.lastChange=Date.now()-1; recomputeClientRx(); persist(['clients','perf','targets','visits','devs','schedule','waitlist','check','collection']); Store.set('mr_meta',JSON.stringify(state.meta)); updateBackupFlag(); updateHeader(); go(activeTab); toast('백업을 복원했습니다'); }catch(err){ toast('백업 파일을 읽을 수 없습니다'); } }; r.readAsText(f); input.value=''; }
function resetAll(){ if(!confirm('정말 모든 데이터를 초기화할까요? 되돌릴 수 없습니다.'))return; KEYS.forEach(k=>{ state[k]= (k==='perf')?null:(k==='meta')?{region:'',lastChange:0,lastBackup:0,privacy:false}:(k==='collection')?{ym:'',rows:[]}:(k==='targets'||k==='schedule'||k==='check')?{}:[]; }); persist(); updateBackupFlag(); updateHeader(); go('dashboard'); toast('초기화되었습니다'); }

/* ---------- 14. 초기화 ---------- */
function updateHeader(){
  const regs=[...new Set(state.clients.map(c=>c.region).filter(Boolean))];
  $('#hdrSub').textContent = state.clients.length? `${state.clients.length}개 거래처 · ${regs.length}개 지역` : '데이터를 업로드하여 시작하세요';
  $('#hdrMonth').textContent = state.perf? '기준월 '+ymLabel(state.perf.latest) : '기준월 –';
  const pb=document.getElementById('hdrPrivacy'); if(pb){ if(privacyOn()){ pb.textContent='🔒 보호중'; pb.className='text-[10px] font-bold mt-0.5 block ml-auto text-brand-700'; } else { pb.textContent='🔓 실명'; pb.className='text-[10px] font-bold mt-0.5 block ml-auto text-slate-400'; } }
}
(async function init(){
  try{ await loadAll(); }catch(e){}
  recomputeClientRx();
  renderTabs(); updateHeader(); updateBackupFlag(); go('dashboard');
})();
</script>
